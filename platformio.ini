[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include

[env:esp32s3]
; Bắt buộc sử dụng version 6.6.0 thay vì mới nhất
platform = espressif32@6.6.0 
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3

; Cấu hình vi điều khiển 240MHz
board_build.f_cpu = 240000000L

; Cấu hình bộ nhớ — PSRAM BẬT cho N16R8 (8MB OPI PSRAM)
; AnimationPlayer cần 2×200KB PSRAM cho double buffering
board_build.arduino.memory_type = qio_opi
build_flags = 
	-DCORE_DEBUG_LEVEL=4
	-DBOARD_HAS_PSRAM
	
	; Cấu hình liên kết thư viện cấu hình màn hình
	-DUSER_SETUP_LOADED=1
	-include lib/TFT_eSPI_config/User_Setup.h
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-I include
	-DLV_COLOR_CHROMA_KEY=lv_color_hex(0x00FF00)
	; -DARDUINO_USB_CDC_ON_BOOT=1

; Các thư viện cốt lõi cần cài đặt
lib_deps = 
	bodmer/TFT_eSPI@^2.5.31
	lvgl/lvgl@^8.3.9
    
; Thiết lập tốc độ truyền Serial để Monitor
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600

