[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Cấu hình vi điều khiển 240MHz
board_build.f_cpu = 240000000L

; Cấu hình bộ nhớ — PSRAM TẠM TẮT (phát hiện gây crash boot loop)
; Bật lại khi xác nhận mạch có PSRAM OPI hoạt động đúng:
;   board_build.arduino.memory_type = qio_opi
;   -DBOARD_HAS_PSRAM
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	
	; Cấu hình liên kết thư viện cấu hình màn hình
	-DUSER_SETUP_LOADED=1
	-include lib/TFT_eSPI_config/User_Setup.h
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-I include

; Các thư viện cốt lõi cần cài đặt
lib_deps = 
	bodmer/TFT_eSPI@^2.5.31
	lvgl/lvgl@^8.3.9
    
; Thiết lập tốc độ truyền Serial để Monitor
monitor_speed = 115200
upload_speed = 921600
